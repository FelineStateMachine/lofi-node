name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format, lint, typecheck
        run: deno task check

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/iroh-js

      - name: Build native addon
        run: deno task native

      - name: Full test suite (codec, tunnel, pair, convergence)
        run: deno task test

      - name: Compile self-contained binary
        run: deno task compile && dist/lofi-node --help >/dev/null 2>&1 || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t lofi-node:ci .

      - name: Container smoke — init, start, health, mesh up, ticket issue
        run: |
          docker volume create smoke
          docker run --rm -v smoke:/data lofi-node:ci \
            init --dir /data --port 4802 --public-url http://127.0.0.1:4802
          docker run -d --name smoke -p 4802:4802 -v smoke:/data lofi-node:ci
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:4802/health >/dev/null 2>&1 && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:4802/health
          docker logs smoke
          # The native transport must come up inside the container; a LAN-only
          # fallback here is a packaging regression, not an acceptable state.
          docker logs smoke 2>&1 | grep -q "mesh:       up"
          docker exec smoke lofi-node ticket issue --dir /data --label ci \
            | grep -q "lofisync1\."
          docker rm -f smoke
